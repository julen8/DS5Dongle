name: Build ds5-bridge.uf2

on:
  push:
    branches: [ "**" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: debian:trixie

    env:
      PICO_SDK_VERSION: "2.2.0"
      TINYUSB_VERSION: "0.20.0"

    steps:
      # ---- 0. 安装编译依赖 ----
      - name: Install build dependencies
        run: |
          export DEBIAN_FRONTEND=noninteractive
          apt-get update -qq
          apt-get install -y -qq --no-install-recommends \
            git \
            cmake \
            ninja-build \
            python3 \
            gcc \
            g++ \
            gcc-arm-none-eabi \
            libnewlib-arm-none-eabi \
            libstdc++-arm-none-eabi-newlib \
            binutils-arm-none-eabi \
            ca-certificates

      # ---- 1. 检出源码（含子模块） ----
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 1

      - name: Mark workspace as safe for git
        run: git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # ---- 2. 克隆 Pico SDK ----
      - name: Clone Pico SDK
        run: |
          if [ ! -f "${GITHUB_WORKSPACE}/pico-sdk/pico_sdk_version.cmake" ]; then
            git clone --depth 1 --branch "${PICO_SDK_VERSION}" \
              https://github.com/raspberrypi/pico-sdk.git "${GITHUB_WORKSPACE}/pico-sdk"
          fi

      # ---- 3. 初始化 SDK 子模块 ----
      - name: Init Pico SDK submodules
        working-directory: ${{ github.workspace }}/pico-sdk
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}/pico-sdk"
          for mod in btstack cyw43-driver lwip mbedtls tinyusb; do
            if [ -z "$(ls -A "lib/${mod}" 2>/dev/null)" ]; then
              git submodule update --init --depth 1 "lib/${mod}"
            fi
          done

      # ---- 4. 升级 TinyUSB 到指定版本 ----
      - name: Upgrade TinyUSB
        working-directory: ${{ github.workspace }}/pico-sdk/lib/tinyusb
        run: |
          git config --global --add safe.directory "${GITHUB_WORKSPACE}/pico-sdk/lib/tinyusb"
          CURRENT_TINYUSB=$(git describe --tags 2>/dev/null || echo "unknown")
          echo "当前 TinyUSB 版本: ${CURRENT_TINYUSB}"
          if [ "${CURRENT_TINYUSB}" != "${TINYUSB_VERSION}" ]; then
            git fetch --depth 1 origin tag "${TINYUSB_VERSION}"
            git checkout "${TINYUSB_VERSION}"
          fi

      # ---- 5. CMake 配置 ----
      - name: Configure (CMake)
        run: |
          mkdir -p "${GITHUB_WORKSPACE}/build"
          cd "${GITHUB_WORKSPACE}/build"
          PICO_SDK_PATH="${GITHUB_WORKSPACE}/pico-sdk" cmake "${GITHUB_WORKSPACE}" \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release

      # ---- 6. 编译 ----
      - name: Build (Ninja)
        working-directory: ${{ github.workspace }}/build
        run: ninja

      # ---- 7. 上传产物 ----
      - name: Upload firmware artifact
        uses: actions/upload-artifact@v4
        with:
          name: ds5-bridge-uf2
          path: ${{ github.workspace }}/build/ds5-bridge.uf2
          if-no-files-found: error
